<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — DevPath</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
  <!--
    Anti-FOUC theme script — MUST come before the stylesheet.
    Reads localStorage synchronously and sets html[data-theme] so the
    browser applies the correct CSS variables on the very first paint.
    Falls back to OS prefers-color-scheme if no saved preference exists.
  -->
  <script>
    (function () {
      try {
        /* Default to light mode; only honour a value the user explicitly saved */
        var saved = localStorage.getItem('devpath-theme');
        document.documentElement.dataset.theme = saved || 'light';
      } catch (e) { /* localStorage blocked in some private modes */ }
    }());
  </script>
  <link rel="stylesheet" href="/static/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <nav class="navbar" aria-label="Main navigation">
    <div class="nav-inner">
      <a href="/" class="nav-logo">Dev<span class="nav-logo-accent">Path</span></a>
      <div class="nav-links">
        <!-- Theme toggle — aria-pressed / aria-label set by script.js initTheme() -->
        <button class="theme-toggle" id="theme-toggle-desktop"
                aria-pressed="false"
                aria-label="Switch to dark mode">
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
      </div>
    </div>
  </nav>
  <div class="error-page">
    <div class="error-page-inner">
      <div class="error-code">404</div>
      <h1>Page Not Found</h1>
      <p>The project or page you are looking for does not exist.</p>
      <a href="/" class="btn-primary" style="display:inline-block;text-decoration:none;padding:14px 32px;">Back to Home</a>
    </div>
  </div>
  <!-- script.js runs initTheme() which syncs button aria-pressed state -->
  <script src="/static/script.js"></script>
</body>
</html>
